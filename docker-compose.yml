services:
    shell:
        build:
            context: .
            dockerfile: ./apps/shell/Dockerfile
            args:
                PROJECT_ID: ${PROJECT_ID:-}
        ports:
            - '3000:3000'
        depends_on:
            - content

    content:
        build:
            context: .
            dockerfile: ./apps/content/Dockerfile
            args:
                PROJECT_ID: ${PROJECT_ID:-}
        ports:
            - '3001:3001'

    api:
        build:
            context: .
            dockerfile: ./apps/api/Dockerfile
            args:
                PROJECT_ID: ${PROJECT_ID:-}
        ports:
            - '3002:3002'

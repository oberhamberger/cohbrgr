packages:
    - packages/*
    - apps/*
    - e2e

allowBuilds:
    '@parcel/watcher': false
    '@swc/core': true
    esbuild: false
    nx: true
    unrs-resolver: false

catalog:
    '@rspack/cli': 2.1.5
    '@rspack/core': 2.1.5

minimumReleaseAge: 1440

publicHoistPattern:
    - '@types/*'
    - '@testing-library/*'

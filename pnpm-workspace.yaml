packages:
    - packages/*
    - apps/*
    - e2e

allowBuilds:
    '@parcel/watcher': false
    '@swc/core': true
    esbuild: false
    nx: true
    unrs-resolver: false

catalog:
    '@rspack/cli': 2.0.4
    '@rspack/core': 2.0.4

# Reject any version published less than 24h ago (pnpm v11 default, made
# explicit so the policy is visible and survives default changes).
minimumReleaseAge: 1440

publicHoistPattern:
    - '@types/*'
    - '@testing-library/*'

packages:
    - packages/*
    - apps/*
    - e2e

allowBuilds:
    '@parcel/watcher': false
    '@swc/core': true
    esbuild: false
    nx: true
    unrs-resolver: false

catalog:
    '@rspack/cli': 2.0.4
    '@rspack/core': 2.0.4

minimumReleaseAgeExclude:
    - qs@6.14.2
    - minimatch@3.1.3
    - minimatch@3.1.4
    - ajv@6.14.0
    - brace-expansion@1.1.13
    - picomatch@2.3.2
    - picomatch@4.0.4
    - yaml@2.8.3
    - path-to-regexp@8.4.0
    - brace-expansion@5.0.6
    - ws@8.20.1

publicHoistPattern:
    - '@types/*'
    - '@testing-library/*'
